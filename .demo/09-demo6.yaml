title: 09 - V5 - wait
version: 3
scenes:
  - id: scene-moyjjnr8-ng0z
    title: Diagram V5
    moves:
      - action: setPresentationView
      - action: openSlide
        path: .demo/slides/03-tech-setup/04d-music-workflow-v5-diagram.md
  - title: MusicWorkflowV5.cs
    moves:
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV5.cs.temp
        dest: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV5.cs
      - action: open
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV5.cs
  - id: demo-mng06oow-7s72
    title: onApprovePressed
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/NoteStreamApp/wwwroot/sketch.js
        highlightWholeLine: true
        position: '315:333'
        highlightBlur: 2
  - id: scene-mmkfam32-822r
    title: POST /approve
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/Program.cs
        highlightWholeLine: true
        position: '43:55'
        highlightBlur: 2
  - id: scene-mmhxsrhj-fkiy
    title: Let's Play!
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/09-synth-presets.md
      - action: executeTerminalCommand
        command: aspire run
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
