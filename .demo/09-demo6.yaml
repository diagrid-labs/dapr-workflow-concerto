title: 09 - V6 - wait
version: 3
scenes:
  - id: scene-moyjjnr8-ng0z
    title: Diagram V6
    moves:
      - action: setPresentationView
      - action: openSlide
        path: .demo/slides/03-tech-setup/04d-music-workflow-v6-diagram.md
  - title: MusicWorkflowV6.cs
    moves:
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV6.cs.temp
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV6.cs
      - action: open
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV6.cs
  - id: demo-mng06oow-7s72
    title: onApprovePressed
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/NoteStreamApp/wwwroot/sketch.js
        highlightWholeLine: true
        position: '315:333'
        highlightBlur: 2
  - id: scene-mmkfam32-822r
    title: POST /approve
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/Program.cs
        highlightWholeLine: true
        position: '39:51'
        highlightBlur: 2
  - id: scene-mmhxsrhj-fkiy
    title: Let's Play! (V6)
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/06-synth-presets.md
      - action: executeTerminalCommand
        command: aspire run
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
