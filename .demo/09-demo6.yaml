title: 09 - V6 - wait
version: 3
scenes:
  - title: MusicWorkflowV6.cs
    moves:
      - action: rename
        path: ConcertoWorkflow/MusicWorkflowV6.cs.temp
        dest: ConcertoWorkflow/MusicWorkflowV6.cs
      - action: open
        path: ConcertoWorkflow/MusicWorkflowV6.cs
  - id: scene-mmkfam32-822r
    title: POST /approve
    moves:
      - action: highlight
        path: ConcertoWorkflow/Program.cs
        highlightWholeLine: true
        position: '40:52'
        highlightBlur: 2
  - id: scene-mmhxsrhj-fkiy
    title: Let's Play!
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/09-synth-presets.md
      - action: executeTerminalCommand
        command: dapr run -f .
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
