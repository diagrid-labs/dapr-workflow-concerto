title: 01 - Start
version: 3
engageTime:
  sessionId: unsra3
scenes:
  - id: demo-moyhvfvs-lw7g
    title: Start workfow app to play intro
    moves:
      - action: openSlide
        path: .demo/slides/01-intro/00-blank.md
      - action: executeTerminalCommand
        command: cd ConcertoWorkflowSolution
        terminalId: dapr-run
        insertTypingMode: instant
        autoExecute: true
      - action: executeTerminalCommand
        command: aspire run
        terminalId: dapr-run
        insertTypingMode: character-by-character
        autoExecute: true
        insertTypingSpeed: 100
  - id: scene-mmhm7tku-rik0
    title: Intro
    moves:
      - action: openSlide
        path: .demo/slides/01-intro/01-intro.md
      - action: setPresentationView
      - action: startEngageTimeSession
    disabled: false
  - id: demo-mmg4gj89-6wc2
    title: Start Timer
    moves:
      - action: executeVSCodeCommand
        command: demo-time.startCountdown
      - action: showInfoMessage
        message: Let's play!
  - id: demo-mmcgboeq-yvo8
    title: Bio
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
      - action: waitForTimeout
        timeout: 500
      - action: setPresentationView
      - action: openSlide
        path: .demo/slides/01-intro/02-bio.md
  - id: demo-mmciuv6y-hhdl
    title: What this session is about
    moves:
      - action: openSlide
        path: .demo/slides/01-intro/04-story.md
