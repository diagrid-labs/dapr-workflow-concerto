title: 04 - Demo 1
version: 3
scenes:
  - id: scene-mmhxsrhj-fjiy
    title: Let's Play!
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/04-synth-presets.md
      - action: rename
        path: ConcertoWorkflow/MusicWorkflowV2.cs
        dest: ConcertoWorkflow/MusicWorkflowV2.cs.temp
      - action: waitForTimeout
        timeout: 500
      - action: executeTerminalCommand
        command: dapr run -f .
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - id: scene-mmgo8nlq-s55t
    title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
