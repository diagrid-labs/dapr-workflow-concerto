title: 04 - Demo 1
version: 3
scenes:
  - title: Program.cs
    moves:
      - action: open
        path: ConcertoWorkflow/Program.cs
  - title: Workflow Registration
    moves:
      - action: highlight
        path: ConcertoWorkflow/Program.cs
        position: '8:13'
        highlightBlur: 2
  - title: Start endpoint
    moves:
      - action: highlight
        path: ConcertoWorkflow/Program.cs
        position: '28:38'
        highlightBlur: 2
  - title: MusicWorkflow
    moves:
      - action: open
        path: ConcertoWorkflow/MusicWorkflow.cs
  - title: SendNoteActivity
    moves:
      - action: open
        path: ConcertoWorkflow/SendNoteActivity.cs
  - id: demo-mmg7akkg-is4u
    title: HttpClient
    moves:
      - action: highlight
        path: ConcertoWorkflow/Program.cs
        position: '7'
        highlightWholeLine: true
        highlightBlur: 2
  - title: Run Dapr Application
    moves:
      - action: executeTerminalCommand
        command: dapr run -f .
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
