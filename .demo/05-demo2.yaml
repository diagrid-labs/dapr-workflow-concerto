title: 05 - V1 - Long score
version: 3
scenes:
  - id: scene-mowlsck0-ez21
    title: Rhythm music score
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/NoteStreamApp/wwwroot/musicscores.js
        highlightBlur: 2
        position: '88:162'
        highlightWholeLine: true
  - id: scene-mowlsk58-92g9
    title: Let's Play!
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/05-synth-presets.md
      - action: executeTerminalCommand
        command: aspire run
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
      - action: showInfoMessage
        message: Check the Diagrid Dev Dashboard
  - id: scene-mowlsm0s-ryh7
    title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
