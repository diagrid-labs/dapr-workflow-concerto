title: 07 - V4 - no foreach
version: 3
scenes:
  - title: MusicWorkflowV4.cs
    moves:
      - action: rename
        path: ConcertoWorkflow/MusicWorkflowV4.cs.temp
        dest: ConcertoWorkflow/MusicWorkflowV4.cs
      - action: open
        path: ConcertoWorkflow/MusicWorkflowV4.cs
  - title: Run Dapr Application
    moves:
      - action: executeTerminalCommand
        command: dapr run -f .
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
