title: 07 - V3 - no foreach
version: 3
demos:
  - id: scene-moyjdmzz-x0r6
    title: Diagram V3
    steps:
      - action: openSlide
        path: .demo/slides/03-tech-setup/04b-music-workflow-v3-diagram.md
  - title: MusicWorkflowV3.cs
    steps:
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV3.cs.temp
        dest: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV3.cs
      - action: open
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV3.cs
  - id: scene-mmhxsrhj-fjiz
    title: Let's Play!
    steps:
      - action: openSlide
        path: .demo/slides/04-demos/07-synth-presets.md
      - action: executeTerminalCommand
        command: dapr run -f .
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    steps:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
  - title: Workflow Registration
    steps:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/Program.cs
        position: '11:15'
        highlightBlur: 2
        highlightWholeLine: true
  - title: Workflow Versioning
    steps:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/Program.cs
        position: '16'
        highlightBlur: 2
        highlightWholeLine: true
  - title: POST /startmusic
    steps:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/Program.cs
        position: '28:38'
        highlightBlur: 2
        highlightWholeLine: true
