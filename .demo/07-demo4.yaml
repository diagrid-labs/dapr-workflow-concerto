title: 07 - V3 - no foreach
version: 3
scenes:
  - id: scene-moyjdmzz-x0r6
    title: Diagram V3
    moves:
      - action: setPresentationView
      - action: openSlide
        path: .demo/slides/03-tech-setup/04b-music-workflow-v3-diagram.md
  - title: MusicWorkflowV3.cs
    moves:
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV3.cs.temp
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV3.cs
      - action: open
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV3.cs
  - id: scene-mmhxsrhj-fjiz
    title: Let's Play!
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/07-synth-presets.md
      - action: executeTerminalCommand
        command: aspire run
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
  - title: Workflow Registration
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/Program.cs
        position: '11:15'
        highlightBlur: 2
        highlightWholeLine: true
  - title: Workflow Versioning
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/Program.cs
        position: '16'
        highlightBlur: 2
        highlightWholeLine: true
  - id: demo-mozxw73m-e8z9
    title: MusicWorkflowV3.cs
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV3.cs
        position: '8'
        highlightWholeLine: true
  - title: POST /startmusic
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/Program.cs
        position: '31:41'
        highlightBlur: 2
        highlightWholeLine: true
