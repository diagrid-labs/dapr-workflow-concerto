title: 10 - Closing
version: 3
engageTime:
  sessionId: ' unsra3'
scenes:
  - title: Things to remember
    moves:
      - action: setPresentationView
      - action: openSlide
        path: .demo/slides/05-closing/01-closing.md
  - id: scene-mmhxsrhj-fliy
    title: Let's Play! (V7)
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/10a-synth-presets.md
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV7.cs.temp
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV7.cs
      - action: waitForTimeout
        timeout: 500
      - action: executeTerminalCommand
        command: aspire run
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - id: scene-mmhxsrhj-gkiy
    title: Encore! (V7)
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/10b-synth-presets.md
  - id: scene-mmi20x0c-2163
    title: Links & Feedback
    moves:
      - action: setPresentationView
      - action: openSlide
        path: .demo/slides/05-closing/02-links.md
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
  - title: Reset All
    moves:
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV2.cs
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV2.cs.temp
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV3.cs
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV3.cs.temp
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV4.cs
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV4.cs.temp
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV5.cs
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV5.cs.temp
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV6.cs
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV6.cs.temp
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV7.cs
        dest: ConcertoWorkflowSolution/ConcertoWorkflow.App/MusicWorkflowV7.cs.temp
      - action: focusTerminal
        terminalId: dev-dashboard
      - action: sendKeybinding
        keybinding: ctrl+c
      - action: executeTerminalCommand
        command: cd ..
        terminalId: dapr-run
      - action: closeEngageTimePoll
        pollId: koaus6
      - action: closeEngageTimePoll
        pollId: nx1v74
