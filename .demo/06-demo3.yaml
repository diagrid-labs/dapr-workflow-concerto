title: 06 - V2 - Repeat
version: 3
scenes:
  - id: scene-moyj7vwg-ueym
    title: Diagram V2
    moves:
      - action: setPresentationView
      - action: openSlide
        path: .demo/slides/03-tech-setup/04a-music-workflow-v2-diagram.md
  - title: MusicWorkflowV2.cs
    moves:
      - action: rename
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV2.cs.temp
        dest: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV2.cs
      - action: open
        path: ConcertoWorkflowSolution/ConcertoWorkflowApp/MusicWorkflowV2.cs
  - id: scene-mmkf4xjz-fnbl
    title: Rhythm music score
    moves:
      - action: highlight
        path: ConcertoWorkflowSolution/NoteStreamApp/wwwroot/musicscores.js
        highlightBlur: 2
        position: '167:191'
        highlightWholeLine: true
  - id: scene-mmhxsrhj-ajiy
    title: Let's Play!
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/05-synth-presets.md
      - action: executeTerminalCommand
        command: aspire run
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
