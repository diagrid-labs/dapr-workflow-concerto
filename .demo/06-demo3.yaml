title: 06 - V3 - InstanceId
version: 3
scenes:
  - title: MusicWorkflowV3.cs
    moves:
      - action: rename
        path: ConcertoWorkflow/MusicWorkflowV3.cs.temp
        dest: ConcertoWorkflow/MusicWorkflowV3.cs
      - action: open
        path: ConcertoWorkflow/MusicWorkflowV3.cs
  - title: SendInstanceIdActivity
    moves:
      - action: open
        path: ConcertoWorkflow/SendInstanceIdActivity.cs
  - id: demo-mnfxoz5d-i928
    title: onTerminatePressed
    moves:
      - action: highlight
        path: NoteStreamApp/wwwroot/sketch.js
        position: '289:313'
        highlightWholeLine: true
        highlightBlur: 2
  - id: scene-mmkf7xft-ftuj
    title: POST /terminate
    moves:
      - action: highlight
        path: ConcertoWorkflow/Program.cs
        position: '73:79'
        highlightWholeLine: true
  - id: scene-mmhxsrhj-fjix
    title: Let's Play!
    moves:
      - action: openSlide
        path: .demo/slides/04-demos/06-synth-presets.md
      - action: executeTerminalCommand
        command: dapr run -f .
        terminalId: dapr-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 75
  - title: Stop Dapr Application
    moves:
      - action: focusTerminal
        terminalId: dapr-run
      - action: sendKeybinding
        keybinding: ctrl+c
